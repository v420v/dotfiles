# Kitty — macOS-only overrides
#
# Pulled in from kitty.conf via `globinclude`. This file is symlinked to
# ~/.config/kitty/macos.conf only on macOS (see home/darwin.nix); on Linux the
# symlink doesn't exist, so the globinclude matches nothing and is skipped.

# Show the native macOS title bar so the window is draggable and exposes the
# traffic-light controls (close / minimise / zoom). Overrides the shared
# `hide_window_decorations yes` in kitty.conf.
hide_window_decorations no
macos_show_window_title_in all
