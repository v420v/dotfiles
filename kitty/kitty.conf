# Kitty — Catppuccin Mocha

# ── Shell ─────────────────────────────────────
shell             zsh
shell_integration enabled

# ── Font ──────────────────────────────────────
font_family       0xProto Nerd Font
bold_font         0xProto Nerd Font Bold
italic_font       0xProto Nerd Font Italic
bold_italic_font  0xProto Nerd Font Bold Italic
font_size         12.0
disable_ligatures never
modify_font       cell_height 110%
symbol_map        U+E000-U+F8FF Symbols Nerd Font

# ── Cursor ────────────────────────────────────
cursor_shape      beam
cursor_blink_interval 0.5

# ── Scrollback ────────────────────────────────
scrollback_lines  10000

# ── Mouse / URLs ──────────────────────────────
url_color #b4befe
url_style curly
detect_urls yes

# ── Window ────────────────────────────────────
window_padding_width  10
window_margin_width   0
hide_window_decorations yes
background_opacity    0.85
dynamic_background_opacity yes
confirm_os_window_close 0

# ── Tabs ──────────────────────────────────────
tab_bar_edge          bottom
tab_bar_style         powerline
tab_powerline_style   slanted
tab_title_template    "{index}: {title}"

# ── Performance ───────────────────────────────
repaint_delay     8
input_delay       3
sync_to_monitor   yes

# ── Catppuccin Mocha colors ───────────────────
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

cursor                  #f5e0dc
cursor_text_color       #1e1e2e

url_color               #f5e0dc

active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# black
color0  #45475a
color8  #585b70
# red
color1  #f38ba8
color9  #f38ba8
# green
color2  #a6e3a1
color10 #a6e3a1
# yellow
color3  #f9e2af
color11 #f9e2af
# blue
color4  #89b4fa
color12 #89b4fa
# magenta
color5  #f5c2e7
color13 #f5c2e7
# cyan
color6  #94e2d5
color14 #94e2d5
# white
color7  #bac2de
color15 #a6adc8

# ── Keybinds ──────────────────────────────────
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+enter new_window
map ctrl+shift+t new_tab
map ctrl+shift+w close_window
map ctrl+shift+l next_tab
map ctrl+shift+h previous_tab
map ctrl+shift+plus  change_font_size all +1
map ctrl+shift+minus change_font_size all -1
map ctrl+shift+0     change_font_size all 0
