# Kitty — Modus Vivendi

# ── Shell ─────────────────────────────────────
shell             zsh
shell_integration enabled

# ── Font ──────────────────────────────────────
font_family       0xProto Nerd Font
bold_font         0xProto Nerd Font Bold
italic_font       0xProto Nerd Font Italic
bold_italic_font  0xProto Nerd Font Bold Italic
font_size         12.0
disable_ligatures never
modify_font       cell_height 110%
symbol_map        U+E000-U+F8FF Symbols Nerd Font

# ── Cursor ────────────────────────────────────
cursor_shape      beam
cursor_blink_interval 0.5

# ── Scrollback ────────────────────────────────
scrollback_lines  10000

# ── Mouse / URLs ──────────────────────────────
url_color #2fafff
url_style curly
detect_urls yes

# ── Window ────────────────────────────────────
window_padding_width  10
window_margin_width   0
hide_window_decorations yes
background_opacity    0.92
dynamic_background_opacity yes
confirm_os_window_close 0

# ── Tabs ──────────────────────────────────────
tab_bar_edge          bottom
tab_bar_style         powerline
tab_powerline_style   slanted
tab_title_template    "{index}: {title}"

# ── Performance ───────────────────────────────
repaint_delay     8
input_delay       3
sync_to_monitor   yes

# ── Modus Vivendi colors ──────────────────────
foreground              #ffffff
background              #000000
selection_foreground    #ffffff
selection_background    #2b2b2b

cursor                  #ffffff
cursor_text_color       #000000

url_color               #2fafff

active_border_color     #ffffff
inactive_border_color   #595959
bell_border_color       #fec43f

active_tab_foreground   #000000
active_tab_background   #ffffff
inactive_tab_foreground #989898
inactive_tab_background #1e1e1e
tab_bar_background      #000000

# black
color0  #000000
color8  #595959
# red
color1  #ff5f59
color9  #ff5f59
# green
color2  #44bc44
color10 #44bc44
# yellow
color3  #d0bc00
color11 #fec43f
# blue
color4  #2fafff
color12 #79a8ff
# magenta
color5  #feacd0
color13 #b6a0ff
# cyan
color6  #00d3d0
color14 #6ae4b9
# white
color7  #a6a6a6
color15 #ffffff

# ── Keybinds ──────────────────────────────────
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+enter new_window
map ctrl+shift+t new_tab
map ctrl+shift+w close_window
map ctrl+shift+l next_tab
map ctrl+shift+h previous_tab
map ctrl+shift+plus  change_font_size all +1
map ctrl+shift+minus change_font_size all -1
map ctrl+shift+0     change_font_size all 0
