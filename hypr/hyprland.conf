# ╭──────────────────────────────────────────────────────────╮
# │                  Hyprland Configuration                  │
# │                  Theme: Catppuccin Mocha                 │
# ╰──────────────────────────────────────────────────────────╯

# ── Monitors ──────────────────────────────────────────────
monitor = DP-2, 3840x2160@60, 0x0, 1.5
monitor = eDP-1, 1366x768@60, 0x1440, 1
monitor = , preferred, auto, 1

# ── Programs ──────────────────────────────────────────────
$terminal   = kitty
$fileMgr    = thunar
$menu       = rofi -show drun
$browser    = firefox
$mod        = SUPER

# ── Autostart ─────────────────────────────────────────────
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = fcitx5 -d
exec-once = systemctl --user start polkit-gnome-authentication-agent-1

# ── Environment ───────────────────────────────────────────
# XCURSOR_{THEME,SIZE} and QT_QPA_PLATFORMTHEME are exported by home-manager
# (home.pointerCursor + qt module). Hyprland-specific cursor and IM bits live
# here.
env = HYPRCURSOR_THEME,catppuccin-mocha-mauve-cursors
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
# On Wayland, GTK and Qt6 use the native text-input-v3 protocol — setting
# GTK_IM_MODULE / QT_IM_MODULE forces the legacy module on top of it and
# fcitx5 warns about the conflict. XMODIFIERS stays for XWayland apps.
env = XMODIFIERS,@im=fcitx

# ── Look & Feel (Catppuccin Mocha) ────────────────────────
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border   = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(45475aaa)
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 10

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(11111baa)
    }

    active_opacity = 1.0
    inactive_opacity = 0.95
}

animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vrr = 1
}

input {
    kb_layout = jp
    kb_variant = OADG109A
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

gesture = 3, horizontal, workspace

# ── Window rules ──────────────────────────────────────────
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(file-roller)$
windowrule = opacity 0.92 0.85, match:class ^(kitty)$
windowrule = opacity 0.97 0.90, match:class ^(thunar)$
windowrule = suppress_event maximize, match:class .*

# ── Keybinds ──────────────────────────────────────────────
# Apps
bind = $mod, Return,   exec, $terminal
bind = $mod, E,        exec, $fileMgr
bind = $mod, B,        exec, $browser
bind = $mod, R,        exec, $menu
bind = $mod, V,        exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Window
bind = $mod, Q,        killactive,
bind = $mod SHIFT, E,  exit,
bind = $mod, F,        fullscreen,
bind = $mod, T,        togglefloating,
bind = $mod, P,        pseudo,
bind = $mod, J,        togglesplit,
bind = $mod, L,        exec, hyprlock

# Focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, h,     movefocus, l
bind = $mod, l,     movefocus, r
bind = $mod, k,     movefocus, u
bind = $mod, j,     movefocus, d

# Move
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Resize
binde = $mod CTRL, left,  resizeactive, -40 0
binde = $mod CTRL, right, resizeactive, 40 0
binde = $mod CTRL, up,    resizeactive, 0 -40
binde = $mod CTRL, down,  resizeactive, 0 40

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Special workspace (scratchpad)
bind = $mod,       S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# Mouse drag
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots
bind =      , Print, exec, hyprshot -m region --clipboard-only
bind = SHIFT, Print, exec, hyprshot -m region
bind = $mod , Print, exec, hyprshot -m output

# Media keys
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl  = , XF86AudioMute,        exec, pamixer -t
bindl  = , XF86AudioMicMute,     exec, pamixer --default-source -t
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous

# Brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
