# Modus Vivendi hyprlock

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = ~/dotfiles/wallpapers/wall.png
    blur_passes = 3
    blur_size = 8
    contrast = 0.9
    brightness = 0.6
    color = rgba(000000ff)
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(ffffffff)
    font_size = 96
    font_family = 0xProto Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    color = rgba(2fafffff)
    font_size = 22
    font_family = 0xProto Nerd Font
    position = 0, 110
    halign = center
    valign = center
}

# User
label {
    monitor =
    text = $USER
    color = rgba(b6a0ffff)
    font_size = 18
    font_family = 0xProto Nerd Font
    position = 0, -60
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.5
    dots_center = true
    outer_color = rgba(ffffffff)
    inner_color = rgba(000000cc)
    font_color = rgba(ffffffff)
    fade_on_empty = false
    placeholder_text = <span foreground="##989898">Password...</span>
    hide_input = false
    rounding = 12
    check_color = rgba(44bc44ff)
    fail_color = rgba(ff5f59ff)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -130
    halign = center
    valign = center
}
