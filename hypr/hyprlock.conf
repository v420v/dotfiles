# Catppuccin Mocha hyprlock

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = ~/dotfiles/wallpapers/wall.png
    blur_passes = 3
    blur_size = 8
    contrast = 0.9
    brightness = 0.7
    color = rgba(1e1e2eff)
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(cdd6f4ff)
    font_size = 96
    font_family = 0xProto Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    color = rgba(b4befeff)
    font_size = 22
    font_family = 0xProto Nerd Font
    position = 0, 110
    halign = center
    valign = center
}

# User
label {
    monitor =
    text = $USER
    color = rgba(cba6f7ff)
    font_size = 18
    font_family = 0xProto Nerd Font
    position = 0, -60
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.5
    dots_center = true
    outer_color = rgba(cba6f7ff)
    inner_color = rgba(1e1e2ecc)
    font_color = rgba(cdd6f4ff)
    fade_on_empty = false
    placeholder_text = <span foreground="##cdd6f4">Password...</span>
    hide_input = false
    rounding = 12
    check_color = rgba(a6e3a1ff)
    fail_color = rgba(f38ba8ff)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -130
    halign = center
    valign = center
}
